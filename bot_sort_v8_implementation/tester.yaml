# BoT-SORT tracker defaults for mode="track"
# Docs: https://docs.ultralytics.com/modes/track/

tracker_type: botsort # (str) Tracker backend: botsort|bytetrack; choose botsort to enable BoT-SORT features
track_high_thresh: 0.2 # (float) First-stage match threshold; lower to keep more existing tracks easily
track_low_thresh: 0.05 # (float) Second-stage threshold; lower to recover very weak detections as the same ID
new_track_thresh: 0.6 # (float) Higher threshold to spawn new track; forces tracker to reuse existing IDs
track_buffer: 900 # (int) Frames to keep lost tracks alive; huge buffer (e.g. 30 sec at 30 fps) to survive occlusions
match_thresh: 0.9 # (float) More lenient association threshold to keep IDs mapped even with poor IoU/cost
fuse_score: True # (bool) Fuse detection score with motion/IoU for matching; stabilizes weak detections

# BoT-SORT specifics
gmc_method: sparseOptFlow # (str) Global motion compensation: sparseOptFlow|orb|sift|ecc|none; helps moving camera scenes

# ReID model related thresh
proximity_thresh: 0.5 # (float) Min IoU to consider tracks proximate for ReID; higher is stricter
appearance_thresh: 0.15 # (float) Lower appearance similarity makes it easier to keep ID despite visual changes
with_reid: True # (bool) Enable ReID model use; needs extra model and compute
model: auto # (str) ReID model name/path; "auto" uses detector features if available